<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect hack.
      // Stores the full path in sessionStorage then redirects to index.html.
      // index.html reads it back and restores the URL via history.replaceState.
      var path = window.location.pathname.replace("/email-sorter", "") || "/";
      var search = window.location.search;
      sessionStorage.setItem("spa_redirect", path + search);
      window.location.replace("/email-sorter/");
    </script>
  </head>
  <body></body>
</html>
