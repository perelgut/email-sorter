<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Connecting Gmail…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0A1628;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #B0C4D8;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div>Connecting your Gmail account…</div>
  <script>
    // Extract auth code from URL query params
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const error  = params.get('error');

    if (code) {
      // Send code to parent window (ConnectGmailButton.jsx is listening)
      window.opener.postMessage({ gmailCode: code }, window.location.origin);
    } else if (error) {
      window.opener.postMessage({ gmailError: error }, window.location.origin);
    }

    // Close popup after a short delay
    setTimeout(() => window.close(), 500);
  </script>
</body>
</html>
